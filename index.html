<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上传图片 - 免费图床托管</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            max-width: 800px;
            width: 90%;
            text-align: center;
        }
        
        .logo {
            font-size: 3rem;
            font-weight: bold;
            color: #764ba2;
            margin-bottom: 20px;
        }
        
        .welcome-text {
            font-size: 2rem;
            color: #333;
            margin-bottom: 30px;
            font-weight: 300;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .feature {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid #764ba2;
        }
        
        .feature h3 {
            color: #764ba2;
            margin-bottom: 10px;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: #764ba2;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5a3a7a;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: transparent;
            color: #764ba2;
            border: 2px solid #764ba2;
        }
        
        .btn-secondary:hover {
            background: #764ba2;
            color: white;
        }
        
        .footer {
            margin-top: 40px;
            color: #888;
            font-size: 0.9rem;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .welcome-text {
                font-size: 1.5rem;
            }
            
            .features {
                grid-template-columns: 1fr;
            }
            
            .buttons {
                flex-direction: column;
                align-items: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Qtimg.com</div>
        <h1 class="welcome-text">基于QQ空间提供的图片外链服务</h1>
        <p class="subtitle">采用全球多地数据备份策略，降低丢失风险，并为数据的长期保存提供保障。</p>
        
        <div class="features">
            <div class="feature">
                <h3>隐私保护</h3>
                <p>文件存储于QQ空间，不收集用户任何信息</p>
            </div>
            <div class="feature">
                <h3>开放生态</h3>
                <p>完美适配各种设备，提供一致的用户体验</p>
            </div>
            <div class="feature">
                <h3>安全可靠</h3>
                <p>采用最佳安全实践，确保数据隐私安全</p>
            </div>
        </div>
        
        <div class="buttons">
            <a href="//charge.qtimg.com" class="btn btn-primary">开始使用</a>
            <a href="//qzone.qtimg.com" class="btn btn-secondary">查看文档</a>
            <a href="//github.qtimg.com" class="btn btn-secondary">GitHub</a>
        </div>
        
        <div class="footer">
            <p style="margin-top: 10px; font-size: 0.8rem; color: #999;">
                <a href="https://beian.miit.gov.cn/" target="_blank" style="color: #999; text-decoration: none;">
                    鲁ICP备2025144109号-10
                </a>
            </p>
            <p>© 2025 qtimg.com - 临沂市微薄利信息技术有限公司</p>
        </div>
    </div>
</body>
</html>
